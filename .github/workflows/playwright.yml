name: Playwright Tests

on:
  # push:
  #   branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # schedule:
  #   - cron: "0 0 * * *"   # UTC 0:00 = JST 9:00
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ① リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v6

      # ② Node.js セットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      # ③ npm install（package.json に基づいて依存関係をインストール）
      - name: Install dependencies
        run: npm ci

      # ④ Playwright のブラウザ依存関係をインストール
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ⑤ テスト実行（Allure + Trace + Screenshot + Video）
      - name: Run Playwright tests
        run: npx playwright test

      # ⑥ Playwright HTML レポートを保存（Artifacts）
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      # ⑦ Allure レポート保存（Artifacts）
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # ⑧ テスト結果（スクリーンショット・動画・trace）保存
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results

      # ⑨ スクリーンショット保存
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/

